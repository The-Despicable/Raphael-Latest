# Block common SQLi
SecRule ARGS "@contains UNION" "id:942100,phase:2,deny,status:406,msg:'SQL Injection Attempt'"
SecRule ARGS "@contains SELECT" "id:942101,phase:2,deny,status:406,msg:'SQL Injection Attempt'"

# Allow numeric IDs
SecRule ARGS:id "@rx ^[0-9]+$" "id:10000,phase:2,pass,msg:'Allowed numeric ID'"